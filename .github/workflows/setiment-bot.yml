# .github/workflows/sentiment-bot.yml
# 시장 심리 진단 봇 v6 — 무료 운영 구조 (상시 리스너 없음)
#
# Actions 사용량: 일일 진단 22회 × ~10분 + 15:40 수거/급락체크 22회 × 1분 ≈ 월 250분
#                → private repo 무료 한도(2,000분/월)의 ~12%. 완전 무료 운영 가능
#
# Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, GEMINI_API_KEY(무료), FRED_API_KEY(선택)
#
# 사용법:
#   · 평일 11:00 KST 일일 전체 진단 → 설문 4문항 발송 후 답장 대기
#     (숫자 4개 회신 시 최종 결과 1통, 놓치면 지난 응답 기반 잠정 결과로 완결.
#      늦은 답장은 다음 실행이 자동 회수해 잠정 결과에 반영)
#   · 평일 15:40 KST 일일 실행 (장 마감 후 1회):
#     ① 메시지 수거 — 하루 중 텔레그램으로 보낸 "심리"/"긴급"/"진단" 요청과
#        숫자 답변을 일괄 처리 (상시 리스너 없이 무료로 트리거 지원)
#     ② 급락 체크 — KOSPI 전일比 -10% 이하(서킷브레이커급)이면 긴급 진단 자동 발송
#   · 긴급 즉시 실행: GitHub 앱 → Actions → 이 워크플로 → Run workflow
#     (전쟁·매크로 이벤트 발발 시 지연 없이 전체 진단)

name: market-sentiment-bot

on:
  schedule:
    - cron: '0 2 * * 1-5'    # 평일 11:00 KST — 일일 정기 진단 (설문 포함)
    - cron: '40 6 * * 1-5'   # 평일 15:40 KST — 일일 실행: 메시지 수거 + 급락 체크(-10%)
  workflow_dispatch:          # 긴급: GitHub 앱에서 Run workflow → 즉시 전체 진단

permissions:
  contents: write   # state/ 커밋용

concurrency:
  group: sentiment-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12    # 진단(~3분) + 답장 대기(5분) + 여유
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -q -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="weekly"                                  # 긴급 수동 = 즉시 전체 진단
          elif [ "${{ github.event.schedule }}" = "0 2 * * 1-5" ]; then
            MODE="weekly"                                  # 일일 정기 진단 (모드명은 호환 유지)
          else
            MODE="daily"                                   # 일일: 메시지 수거 + 급락 체크
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "실행 모드: $MODE"

      - name: Run sentiment bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIGEST_REPO: ${{ secrets.DIGEST_REPO }}      # 리서치 에이전트 repo (예: mason/research-agent). 같은 repo면 비워둠
          GH_PAT: ${{ secrets.GH_PAT }}                # 타 private repo 읽기용 토큰 (같은 repo면 불필요)
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANSWER_WAIT_MIN: '5'    # 답장 대기 시간(분). 0이면 대기 없음 (답장은 15:40 일일 실행이 수거)
        run: python sentiment_bot.py --${{ steps.mode.outputs.mode }}

      - name: Persist state
        run: |
          git config user.name "sentiment-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "state: ${{ steps.mode.outputs.mode }} $(date -u '+%F %T')"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi

      - name: Failure alert
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ sentiment-bot 실행 실패 (mode: ${{ steps.mode.outputs.mode }}, run: ${{ github.run_id }})" > /dev/null
