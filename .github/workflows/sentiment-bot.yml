# .github/workflows/sentiment-bot.yml
# 시장 심리 진단 봇 v15 — 상주 루프 구조 (할인율 봇과 동일 아키텍처)
#
# 구조: 매시 정각 기동 → 55분간 long polling 상주
#   · 메시지(포트 등록·"심리"/"진단" 요청·설문 답장)에 수 초 내 응답
#   · 평일 11:00 KST 일일 진단, 15:40 KST 급락 체크는 루프 내부 시계로 발동
#     → 크론 지연과 무관하게 정시 실행, state/sched_markers.json으로 하루 1회 보장
#   · 지연 기동 시에도 그날 안에는 반드시 실행 (예: 11:20 기동 → 즉시 진단)
#
# ⚠️ Public repo 전제 (Actions 무제한). Private면 월 2,000분 한도를 이틀 만에 소진.
#
# Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, GEMINI_API_KEY(무료),
#          DIGEST_REPO/GH_PAT(선택), FRED_API_KEY(선택)
#
# 긴급 전체 진단: Actions → Run workflow (--weekly로 즉시 진단 후 종료,
#                대기 중인 상주 인스턴스와는 concurrency로 직렬화)

name: market-sentiment-bot

on:
  schedule:
    - cron: '0 * * * *'      # 매시 정각 상주 기동 (정기작업은 내부 시계가 발동)
  workflow_dispatch:          # 긴급: 즉시 전체 진단

permissions:
  contents: write   # state/ 커밋용

concurrency:
  group: sentiment-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 58
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -q -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="weekly"     # 긴급 수동 = 즉시 전체 진단 후 종료
          else
            MODE="loop"       # 정각 크론 = 55분 상주
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "실행 모드: $MODE"

      - name: Run sentiment bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DIGEST_REPO: ${{ secrets.DIGEST_REPO }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANSWER_WAIT_MIN: '5'    # 진단 발송 후 답장 대기(분) — 상주라 놓쳐도 즉시 회수됨
          LOOP_MINUTES: '55'
        run: python sentiment_bot.py --${{ steps.mode.outputs.mode }}

      - name: Persist state
        if: always()   # 타임아웃/실패여도 오프셋·마커·응답 상태를 반드시 커밋 (중복 방지)
        run: |
          git config user.name "sentiment-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "state: ${{ steps.mode.outputs.mode }} $(date -u '+%F %T')"
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push || true
          fi

      - name: Failure alert
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ sentiment-bot 실행 실패 (mode: ${{ steps.mode.outputs.mode }}, run: ${{ github.run_id }})" > /dev/null
